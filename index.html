<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lifecounter v16.7</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Share+Tech+Mono&family=Sawarabi+Mincho&family=M+PLUS+Rounded+1c:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --main-color: #00f3ff;
            --sub-color: #ff003c;
            --future-color: #ffaa00;
            --text-color: #ffffff;
            --dim-text: #556666;
            --card-bg: #0a0a0a;
            --border: #222;
            --font-main: 'Share Tech Mono', 'Noto Sans JP', monospace;
        }

        body.theme-zen {
            --bg-color: #f0eee4;
            --main-color: #4a5d4e;
            --sub-color: #8b4513;
            --future-color: #b8860b;
            --text-color: #2c2c2c;
            --dim-text: #888877;
            --card-bg: #ffffff;
            --border: #d1cfc0;
            --font-main: 'Sawarabi Mincho', serif;
        }

        body.theme-kawaii {
            --bg-color: #fff0f6;
            --main-color: #ff66aa;
            --sub-color: #77ddff;
            --future-color: #ff9900;
            --text-color: #552244;
            --dim-text: #bb99aa;
            --card-bg: #ffffff;
            --border: #ffcce0;
            --font-main: 'M PLUS Rounded 1c', sans-serif;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: var(--font-main); margin: 0; padding: 0; height: 100dvh; overflow: hidden; display: flex; flex-direction: column; transition: background-color 0.5s; }
        .scanline { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.1)); background-size: 100% 4px; pointer-events: none; z-index: 90; opacity: 0.3; }

        /* SCREENS */
        #onboardingScreen, #bootScreen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 999; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 30px; }
        .ob-logo { font-size: 2rem; color: var(--main-color); letter-spacing: 4px; margin-bottom: 40px; }
        .ob-text { color: var(--main-color); margin-bottom: 20px; min-height: 1.2em; }
        .ob-input-group { width: 100%; max-width: 300px; margin-bottom: 30px; opacity: 0; transition: opacity 1s; }
        .ob-input-group input { width: 100%; background: #111; border: 1px solid var(--main-color); color: #fff; padding: 15px; text-align: center; font-family: inherit; }
        .ob-btn { background: var(--main-color); color: #000; border: none; padding: 15px 40px; font-weight: bold; cursor: pointer; opacity: 0; transition: opacity 1s; }
        
        header { height: 50px; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); z-index: 10; }
        .app-name { font-size: 1.1rem; letter-spacing: 2px; color: var(--main-color); cursor: pointer; }
        
        #viewport { flex: 1; position: relative; width: 100%; overflow: hidden; }
        .view-section { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: transparent; transition: transform 0.3s ease-out, opacity 0.3s; display: flex; flex-direction: column; opacity: 0; pointer-events: none; }
        .view-center { transform: translateX(0); opacity: 1; pointer-events: auto; }
        .view-left { transform: translateX(-100%); }
        .view-right { transform: translateX(100%); }

        .list-container { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 140px; }
        .main-display { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .count-days { font-size: 4.5rem; line-height: 0.9; color: var(--main-color); }

        .card { background: var(--card-bg); border: 1px solid var(--border); margin-bottom: 12px; padding: 15px; border-radius: 4px; }
        .card-past .card-title, .card-past .card-days { color: var(--main-color); }
        .card-future .card-title, .card-future .card-days { color: var(--future-color); }

        .fab { position: absolute; bottom: 110px; width: 64px; height: 64px; border-radius: 50%; background: var(--bg-color); border: 2px solid var(--main-color); color: var(--main-color); display: flex; justify-content: center; align-items: center; font-size: 32px; z-index: 20; cursor: pointer; }
        .fab-past { right: 20px; }
        .fab-future { left: 20px; border-color: var(--future-color); color: var(--future-color); }

        .footer-nav { height: 70px; background: var(--bg-color); border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: relative; z-index: 50; }
        .nav-btn { flex: 1; text-align: center; font-size: 0.7rem; color: var(--dim-text); cursor: pointer; }
        .nav-btn.active { color: var(--main-color); font-weight: bold; }

        /* MODAL */
        #addModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; }
        .modal-box { background: var(--bg-color); border: 1px solid var(--border); padding: 20px; width: 95%; max-width: 350px; border-radius: 8px; overflow-y: auto; max-height: 90vh; }
        .input-item label { display: block; font-size: 0.7rem; color: var(--dim-text); margin-bottom: 5px; }
        .input-item input, .input-item select, .input-item textarea { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 10px; font-family: inherit; margin-bottom: 10px; }
        .btn-modal { flex: 1; padding: 12px; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; }
        
        .btn-save { background: var(--main-color); color: #000; }
        .btn-save.future-mode { background: var(--future-color) !important; color: #000; }
        
        #cameraModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 600; flex-direction: column; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .shutter-btn { width: 70px; height: 70px; border-radius: 50%; background: #fff; border: 5px solid #333; cursor: pointer; position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 700; }

        /* ALARM STYLE (💀ボタンの赤枠化) */
        .switch-btn { width: 64px; height: 64px; background: var(--bg-color); border: 2px solid var(--main-color); border-radius: 50%; color: var(--main-color); font-size: 1.8rem; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: all 0.3s; }
        .switch-btn.warning { border-color: var(--sub-color) !important; color: var(--sub-color) !important; animation: pulse-red 0.8s infinite alternate; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 10px var(--sub-color); } 100% { box-shadow: 0 0 30px var(--sub-color); transform: scale(1.05); } }

    </style>
</head>
<body>

    <div class="scanline"></div>

    <div id="onboardingScreen">
        <div class="ob-logo">Lifecounter</div>
        <div class="ob-text" id="obText"></div>
        <div class="ob-input-group" id="obInputGroup">
            <input type="datetime-local" id="obDate" step="1">
        </div>
        <button class="ob-btn" id="obBtn" onclick="finishOnboarding()">INITIALIZE</button>
    </div>

    <div id="appContainer" style="display:none; width:100%; height:100%; flex-direction:column;">
        <header>
            <div class="app-name" onclick="titleClickCount()">Lifecounter</div>
            <div onclick="startCamera()" style="cursor:pointer; font-size:1.2rem;">📷</div>
        </header>

        <div id="viewport">
            <div id="view-past" class="view-section view-left">
                <div class="list-container" id="pastList"></div>
                <div class="fab fab-past" onclick="openModal('past')">＋</div>
            </div>
            <div id="view-now" class="view-section view-center">
                <div class="main-display">
                    <div id="mainLabel" style="font-size:0.8rem; color:var(--dim-text); letter-spacing:4px; margin-bottom:10px;">TOTAL SURVIVAL</div>
                    <div id="heroDays" class="count-days">0</div>
                    <div style="margin-top:15px; padding:4px 15px; border:1px solid var(--border); border-radius:15px;"><span id="heroSeconds">0.0000</span> s</div>
                </div>
            </div>
            <div id="view-future" class="view-section view-right">
                <div class="list-container" id="futureList"></div>
                <div class="fab fab-future" onclick="openModal('future')">＋</div>
            </div>
        </div>

        <div class="switch-wrapper" style="position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; z-index: 100;">
            <div class="switch-btn" id="skullBtn" onclick="resetDeathTimer()">💀</div>
            <div id="skullTimerDisplay" style="margin-top:5px; font-size:0.9rem; color:var(--dim-text); font-weight:bold;">----.-</div>
        </div>

        <div class="footer-nav">
            <div class="nav-btn" id="nav-past" onclick="goTo('past')">PAST</div>
            <div class="nav-btn active" id="nav-now" onclick="goTo('now')">NOW</div>
            <div class="nav-btn" id="nav-future" onclick="goTo('future')">FUTURE</div>
        </div>

        <div id="addModal">
            <div class="modal-box">
                <div id="modalTitle" style="color:var(--text-color); margin-bottom:15px; font-weight:bold;">SETTINGS</div>
                <div id="formFields">
                    <div class="input-item"><label>TITLE</label><input type="text" id="inpTitle"></div>
                    <div class="input-item"><label>DATE</label><input type="datetime-local" id="inpDate" step="1"></div>
                </div>
                <div id="settingsFields" style="display:none; border-top:1px solid var(--border); padding-top:15px;">
                    <div class="input-item">
                        <label>THEME</label>
                        <select id="inpTheme" onchange="applyTheme(this.value)">
                            <option value="neo">NEO TOKYO</option>
                            <option value="zen">ZEN</option>
                            <option value="kawaii">Kawaii</option>
                        </select>
                    </div>
                    <div style="color:var(--sub-color); font-size:0.8rem; margin-bottom:10px;">[ EMERGENCY PROTOCOL ]</div>
                    <div class="input-item"><label>EMAIL</label><input type="email" id="inpEmail"></div>
                    <div class="input-item"><label>MESSAGE</label><textarea id="inpMessage"></textarea></div>
                    <div style="display:flex; gap:10px;">
                        <div class="input-item" style="flex:1;"><label>LIMIT (SEC)</label><input type="number" id="inpEmergency"></div>
                        <div class="input-item" style="flex:1;"><label>GRACE (SEC)</label><input type="number" id="inpGrace"></div>
                    </div>
                </div>
                <div style="display:flex; gap:10px; margin-top:20px;">
                    <button class="btn-modal" style="background:#333; color:#ccc;" onclick="closeModal()">CANCEL</button>
                    <button class="btn-modal btn-save" id="btnSaveEvent" onclick="saveEvent()">SAVE</button>
                </div>
            </div>
        </div>

        <div id="bootScreen" onclick="startCamera()">
            <div style="font-size:1.5rem; margin-bottom:20px; color:var(--main-color)">Lifecounter v16.7</div>
            <div id="bootIcon" style="font-size:3rem; margin-bottom:20px;">🔒</div>
            <div class="boot-blink" style="color:var(--main-color)">TAP TO UNLOCK (CAMERA REQUIRED)</div>
        </div>

        <div id="cameraModal">
            <video id="videoFeed" autoplay playsinline></video>
            <div class="shutter-btn" onclick="takePhoto()"></div>
        </div>
    </div>

    <script>
        const APP_KEY = "lifecounter_v16_7";
        let EMERGENCY_SEC = parseInt(localStorage.getItem(APP_KEY + '_emergency')) || 3600;
        let GRACE_SEC = parseInt(localStorage.getItem(APP_KEY + '_grace')) || 600;
        let TARGET_EMAIL = localStorage.getItem(APP_KEY + '_email') || "";
        let EMERGENCY_MSG = localStorage.getItem(APP_KEY + '_message') || "Emergency alert from Lifecounter.";
        let CURRENT_THEME = localStorage.getItem(APP_KEY + '_theme') || "neo";
        
        let birthDate = null;
        let pastEvents = JSON.parse(localStorage.getItem(APP_KEY + '_past')) || [];
        let futureEvents = JSON.parse(localStorage.getItem(APP_KEY + '_future')) || [];
        let deadline = Date.now() + (EMERGENCY_SEC * 1000);
        let clickCount = 0;
        let emergencySent = false;
        let currentModalType = 'past';

        window.onload = () => {
            applyTheme(CURRENT_THEME);
            const saved = localStorage.getItem(APP_KEY + '_birth');
            if (saved && saved !== "null") { 
                birthDate = new Date(saved); 
                checkDailyLog(); 
            } else { 
                showOnboarding(); 
            }
        };

        // ログイン（アプリ使用）のためのセルフィ儀式チェック（修正版）
        function checkDailyLog() {
            const today = new Date().toISOString().split('T')[0];
            
            // 【重要修正】親コンテナは常に表示。bootScreenをかぶせて隠す。
            document.getElementById('appContainer').style.display = 'flex'; 

            if (localStorage.getItem(APP_KEY + '_last_log') !== today) {
                document.getElementById('bootScreen').style.display = 'flex';
            } else {
                document.getElementById('bootScreen').style.display = 'none';
                startApp();
            }
        }

        function showOnboarding() {
            document.getElementById('onboardingScreen').style.display = 'flex';
            let msg = "INITIALIZING CORE SYSTEM...", i = 0;
            let t = setInterval(() => {
                document.getElementById('obText').innerText += msg[i++];
                if(i>=msg.length){ clearInterval(t); document.getElementById('obInputGroup').style.opacity=1; document.getElementById('obBtn').style.opacity=1; }
            }, 50);
        }

        // オンボーディング完了処理（修正版）
        function finishOnboarding() {
            const val = document.getElementById('obDate').value; if(!val) return;
            localStorage.setItem(APP_KEY + '_birth', val); birthDate = new Date(val);
            
            // 初回登録時に「BIRTH」を自動追加
            if (pastEvents.length === 0) {
                pastEvents.push({t: "SYSTEM START (BIRTH)", d: val});
                localStorage.setItem(APP_KEY + '_past', JSON.stringify(pastEvents));
            }

            document.getElementById('onboardingScreen').style.display = 'none'; 
            checkDailyLog(); // そのままカメラ儀式へ
        }

        function applyTheme(theme) {
            CURRENT_THEME = theme;
            document.body.className = (theme === 'neo' ? '' : 'theme-' + theme);
            localStorage.setItem(APP_KEY + '_theme', theme);
            const label = document.getElementById('mainLabel');
            const skull = document.getElementById('skullBtn');
            if (theme === 'zen') { label.innerText = "心身の調和（継続日数）"; skull.innerText = "🙏"; } 
            else if (theme === 'kawaii') { label.innerText = "今日も生きててエライ！💖"; skull.innerText = "✨"; } 
            else { label.innerText = "TOTAL SURVIVAL"; skull.innerText = "💀"; }
            renderLists();
        }

        function startApp() { 
            setInterval(tick, 100); 
            renderLists(); 
            dailyCheck(); // 1日1回の通知チェックを実行
        }

        // 1日1回だけ走る、Futureイベントのカウントダウン通知
        function dailyCheck() {
            const todayStr = new Date().toISOString().split('T')[0];
            if (localStorage.getItem(APP_KEY + '_last_daily_check') === todayStr) return;

            let alerts = [];
            const now = new Date();
            const notifyDays = [100, 50, 30, 20, 10, 7, 3, 2, 1, 0];

            futureEvents.forEach(ev => {
                const diffDays = Math.ceil((new Date(ev.d).getTime() - now.getTime()) / 86400000);
                if (notifyDays.includes(diffDays)) {
                    if (diffDays === 0) alerts.push(`【当日】目標「${ev.t}」の日が来ました！`);
                    else alerts.push(`【リマインド】「${ev.t}」まであと ${diffDays}日です`);
                }
            });

            if (alerts.length > 0) {
                const msg = "Lifecounter カウントダウン通知\n\n" + alerts.join("\n");
                sendGasNotification("EVENT NOTIFICATION", msg);
            }
            localStorage.setItem(APP_KEY + '_last_daily_check', todayStr);
        }

        function tick() {
            if (!birthDate) return;
            const now = Date.now();
            const diff = now - birthDate.getTime();
            
            document.getElementById('heroDays').innerText = Math.floor(diff/86400000);
            document.getElementById('heroSeconds').innerText = (diff/1000).toFixed(4);
            
            const rem = Math.max(0, (deadline - now)/1000);
            const timerDisplay = document.getElementById('skullTimerDisplay');
            timerDisplay.innerText = rem.toFixed(1) + "s";

            const skullBtn = document.getElementById('skullBtn');

            // 演出と死活通知
            if (rem <= 0) {
                document.body.style.backgroundColor = "#660000"; 
                timerDisplay.style.color = "#ff0000";
                skullBtn.classList.add('warning'); // ドクロ赤枠化
                
                if (!emergencySent && TARGET_EMAIL) {
                    emergencySent = true; 
                    console.log("💀 緊急プロトコル発動...");
                    const msg = `${EMERGENCY_MSG}\n\n総生存日数: ${Math.floor(diff/86400000)}日\n最終ログ: ${new Date().toLocaleString()}`;
                    sendGasNotification("EMERGENCY ALERT", msg).then(() => {
                        alert("GASへアラートを送信しました。");
                    });
                }
            } else {
                document.body.style.backgroundColor = "var(--bg-color)";
                timerDisplay.style.color = "var(--dim-text)";
                skullBtn.classList.remove('warning');
                emergencySent = false;
            }
        }

        async function sendGasNotification(type, message) {
            const GAS_URL = "https://script.google.com/macros/s/AKfycbwfymOuNu5UNAPnXtNNpPqvE0AR3czyLJN2X-EN02wgI-ZHOztOWwsY8oTJf037PeElMg/exec"; 
            try {
                await fetch(GAS_URL, {
                    method: "POST",
                    mode: "no-cors",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ type: type, message: message })
                });
                return true;
            } catch (error) {
                console.error("GAS送信失敗:", error);
                return false;
            }
        }

        function openModal(type) {
            currentModalType = type;
            const isSettings = (type === 'settings');
            const saveBtn = document.getElementById('btnSaveEvent');
            
            document.getElementById('formFields').style.display = isSettings ? 'none' : 'block';
            document.getElementById('settingsFields').style.display = isSettings ? 'block' : 'none';
            document.getElementById('modalTitle').innerText = isSettings ? "SETTINGS" : type.toUpperCase() + " EVENT";
            
            saveBtn.className = "btn-modal btn-save" + (type === 'future' ? " future-mode" : "");
            
            if (isSettings) {
                document.getElementById('inpTheme').value = CURRENT_THEME;
                document.getElementById('inpEmail').value = TARGET_EMAIL;
                document.getElementById('inpMessage').value = EMERGENCY_MSG;
                document.getElementById('inpEmergency').value = EMERGENCY_SEC;
                document.getElementById('inpGrace').value = GRACE_SEC;
            }
            document.getElementById('addModal').style.display = 'flex';
        }

        function saveEvent() {
            if (currentModalType === 'settings') {
                EMERGENCY_SEC = parseInt(document.getElementById('inpEmergency').value) || 3600;
                GRACE_SEC = parseInt(document.getElementById('inpGrace').value) || 600;
                TARGET_EMAIL = document.getElementById('inpEmail').value;
                EMERGENCY_MSG = document.getElementById('inpMessage').value;
                localStorage.setItem(APP_KEY + '_emergency', EMERGENCY_SEC);
                localStorage.setItem(APP_KEY + '_grace', GRACE_SEC);
                localStorage.setItem(APP_KEY + '_email', TARGET_EMAIL);
                localStorage.setItem(APP_KEY + '_message', EMERGENCY_MSG);
            } else {
                const t = document.getElementById('inpTitle').value, d = document.getElementById('inpDate').value;
                if(!t || !d) return;
                const arr = (currentModalType === 'past' ? pastEvents : futureEvents);
                arr.push({t, d});
                localStorage.setItem(APP_KEY + '_' + currentModalType, JSON.stringify(arr));
            }
            renderLists(); closeModal();
        }

        function delEvent(type, index) {
            if (!confirm("本当にこのイベントを削除しますか？")) return;
            const arr = (type === 'past' ? pastEvents : futureEvents);
            arr.splice(index, 1);
            localStorage.setItem(APP_KEY + '_' + type, JSON.stringify(arr));
            renderLists();
        }

        function renderLists(){
            ['past', 'future'].forEach(type => {
                const container = document.getElementById(type + 'List');
                const es = (type === 'past' ? pastEvents : futureEvents);
                container.innerHTML = `<div style="padding:10px; font-size:0.7rem; opacity:0.5;">${type.toUpperCase()}</div>` + 
                    es.map((ev, index) => `<div class="card card-${type}">
                        <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                            <div class="card-title" style="font-weight:bold; margin-bottom:5px;">${ev.t}</div>
                            <div onclick="delEvent('${type}', ${index})" style="cursor:pointer; color:var(--sub-color); font-size:1.2rem; line-height:1;">×</div>
                        </div>
                        <div class="card-days" style="font-size:1.8rem; font-weight:bold;">${Math.abs(Math.floor((Date.now() - new Date(ev.d))/86400000))} DAYS</div>
                    </div>`).join('');
            });
        }

        function goTo(v) {
            ['past', 'now', 'future'].forEach(s => {
                const el = document.getElementById('view-'+s);
                el.className = 'view-section ' + (s===v ? 'view-center' : (['past','now','future'].indexOf(s) < ['past','now','future'].indexOf(v) ? 'view-left' : 'view-right'));
                document.getElementById('nav-'+s).classList.toggle('active', s===v);
            });
        }

        function titleClickCount() { clickCount++; if(clickCount >= 3) { clickCount=0; openModal('settings'); } setTimeout(() => clickCount = 0, 2000); }
        function closeModal(){ document.getElementById('addModal').style.display='none'; }
        function resetDeathTimer() { deadline = Date.now() + (EMERGENCY_SEC * 1000); }
        
        async function startCamera() { 
            try { 
                const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } }); 
                document.getElementById('videoFeed').srcObject = s; 
                document.getElementById('cameraModal').style.display = 'flex'; 
                document.getElementById('bootScreen').style.display = 'none'; 
            } catch(e){ 
                alert("カメラの許可が必要です。"); 
            } 
        }

        function takePhoto() { 
            const today = new Date().toISOString().split('T')[0];
            localStorage.setItem(APP_KEY + '_last_log', today);
            
            document.getElementById('cameraModal').style.display = 'none'; 
            
            const video = document.getElementById('videoFeed');
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }

            checkDailyLog(); 
        }
    </script>
</body>
</html>
